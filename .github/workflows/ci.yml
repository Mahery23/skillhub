name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — CI : install, lint, test, build
  # ─────────────────────────────────────────
  ci:
    name: CI — Install · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour SonarCloud

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, zip, bcmath, gd, mongodb-2.2.0

      # 3. Install dépendances backend (avec dev pour pouvoir lancer PHPUnit)
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/logs
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          composer install --optimize-autoloader --no-interaction --ignore-platform-req=ext-mongodb

      # 4. Lint backend (PHP CodeSniffer)
      - name: Lint backend
        working-directory: ./backend
        run: ./vendor/bin/phpcs --standard=PSR12 app/ || true

      # 5. Tests backend + génération du rapport de coverage (Clover pour Sonar)
      - name: Run backend tests with coverage
        working-directory: ./backend
        run: php artisan test --env=testing --coverage-clover=coverage.xml

      # 6. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # 7. Install dépendances frontend
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # 8. Lint frontend
      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint || true

      # 9. Analyse SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 10. Build images Docker taguées avec le SHA du commit
      - name: Build Docker images
        run: |
          docker build -t skillhub-api:${{ github.sha }} ./backend
          docker build -t skillhub-frontend:${{ github.sha }} ./frontend

  # ─────────────────────────────────────────
  # JOB 2 — CD : push images vers Docker Hub
  # Se déclenche uniquement sur merge → main
  # ─────────────────────────────────────────
  cd:
    name: CD — Push to Docker Hub
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login Docker Hub avec les secrets GitHub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build et push image API
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-api:latest

      # Build et push image Frontend
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-frontend:latest
