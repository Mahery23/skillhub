# Configuration Supervisor : permet de lancer et maintenir plusieurs services dans le même conteneur Docker
# ici PHP-FPM (exécution PHP) et Nginx (serveur web), avec redémarrage automatique en cas de crash.

[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

; Démarre PHP-FPM
[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; Démarre nginx
[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0