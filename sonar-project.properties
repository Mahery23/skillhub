sonar.projectKey=Mahery23_skillhub
sonar.organization=mahery23

# Sources a analyser
sonar.sources=backend/app,frontend/src

# Tests (backend PHPUnit + frontend Vitest)
sonar.tests=backend/tests,frontend/src
sonar.test.inclusions=frontend/src/**/*.test.js,frontend/src/**/*.test.jsx

# Rapports de coverage
sonar.php.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusions de l'analyse (vendor, build, configs, tests dans les sources)
sonar.exclusions=**/vendor/**,**/node_modules/**,**/dist/**,**/build/**,**/storage/**,**/bootstrap/cache/**,**/*.blade.php,**/public/**,**/coverage/**

# Exclusions de la coverage (fichiers qu'on n'a pas a couvrir)
sonar.coverage.exclusions=backend/app/Console/**,backend/app/Exceptions/**,backend/app/Providers/**,backend/database/migrations/**,backend/database/seeders/**,frontend/src/main.jsx,frontend/src/App.jsx,frontend/src/pages/**,frontend/vite.config.js,frontend/src/test/**,frontend/src/**/*.test.js,frontend/src/**/*.test.jsx

# Encodage
sonar.sourceEncoding=UTF-8
